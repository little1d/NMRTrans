# H-NMR only experiment. Paths are resolved relative to the project root.

MERGED_DATA_DIR: cache
VOCAB_PATH: vocab.json
SAVE_DIR: checkpoints/h
T5_MODEL_NAME: models/t5-small

TOKENIZER_TYPE: custom

USE_C_NMR: false
USE_H_NMR: true
USE_FORMULA_GUIDANCE: false

USE_RANDOM_T5_INIT: false
FREEZE_T5_DECODER: false
REMOVE_CROSS_ATTENTION_POSITION_BIAS: true
SHUFFLE_ENCODER_OUTPUTS: false
USE_CUSTOM_DECODER: false

MAX_PEAKS: 60
MAX_SMILES_LENGTH: 80

PEAK_ENCODER_N_LAYERS: 6
PEAK_ENCODER_N_HEADS: 8
PEAK_ENCODER_FF_DIM: 1024
PEAK_ENCODER_DROPOUT: 0.1

USE_NMR_JITTER: false
NMR_JITTER_RANGE_C: 2.0
NMR_JITTER_RANGE_H: 0.2

BATCH_SIZE: 1024
TEST_BATCH_SIZE: 64
LEARNING_RATE: 0.0001
EPOCHS: 10000
GRAD_CLIP: 1.0
ACCUM_GRAD_BATCHES: 1
WEIGHT_DECAY: 0.1

NUM_DATA_WORKERS: 8
PREFETCH_FACTOR: 2

LIMIT_VAL_BATCHES: 1.0
CHECK_VAL_EVERY_N_EPOCH: 20

ACCELERATOR: gpu
DEVICES: 4
STRATEGY: ddp_find_unused_parameters_true
PRECISION: "32"
NUM_SANITY_VAL_STEPS: 0
LOG_EVERY_N_STEPS: 50
ENABLE_PROGRESS_BAR: true
ENABLE_MODEL_SUMMARY: true
DETERMINISTIC: false

USE_SWANLAB: true
SWANLAB_PROJECT: nmrtrans
SWANLAB_RUN_NAME: t5-small-4gpu-h
SWANLAB_INIT_KWARGS:
  mode: offline

RESUME_CHECKPOINT:
TEST_CKPT_PATH:
